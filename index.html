// ===== PRINT / DOWNLOAD =====
var printing = false;
function printPage() {
  printing = true;
  document.body.classList.add("printing");
  document.getElementById("page-content").classList.add("print-area");
  setTimeout(function() {
    window.print();
    document.body.classList.remove("printing");
    document.getElementById("page-content").classList.remove("print-area");
    printing = false;
  }, 300);
}
function downloadPage() {
  var title = document.getElementById("page-title").textContent;
  var subtitle = document.getElementById("page-subtitle").textContent;
  var contentEl = document.getElementById("page-content");
  var contentHTML = contentEl ? contentEl.innerHTML : "";
  var dateStr = new Date().toLocaleDateString("id-ID", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
  var html = '<!DOCTYPE html><html><head><meta charset="utf-8">' +
    '<title>' + title + ' - Perisai Aceh</title>' +
    '<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">' +
    '<style>' +
    'body { font-family: "Bricolage Grotesque", sans-serif; padding: 40px; color: #000; line-height: 1.7; -webkit-font-smoothing: antialiased; }' +
    '.header { margin-bottom: 24px; border-bottom: 2px solid #00837d; padding-bottom: 16px; }' +
    '.header h1 { font-size: 24px; font-weight: 900; margin: 0 0 4px; color: #006763; }' +
    '.header p { font-size: 13px; color: #555; margin: 0; }' +
    '.header .meta { font-size: 11px; color: #888; margin-top: 8px; }' +
    '.content { font-size: 13px; }' +
    '.content table { width: 100%; border-collapse: collapse; font-size: 12px; }' +
    '.content th, .content td { border: 1px solid #ccc; padding: 8px; text-align: left; }' +
    '.content th { background: #f0f0f0; font-weight: 700; }' +
    '.footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #ddd; font-size: 11px; color: #888; text-align: center; }' +
    '.no-print { display: none; }' +
    'button { display: none; }' +
    '</style></head><body>' +
    '<div class="header"><h1>' + title + '</h1><p>' + subtitle + '</p><div class="meta">Dicetak: ' + dateStr + ' | Sistem Pengendalian Intern Pemerintah Aceh (PERISAI)</div></div>' +
    '<div class="content">' + stripForDownload(contentHTML) + '</div>' +
    '<div class="footer">Dokumen ini dihasilkan secara otomatis dari Sistem PERISAI Aceh &mdash; ' + dateStr + '</div>' +
    <aside class="w-72 bg-surface shrink-0 ...
    '</body></html>';
  var blob = new Blob([html], { type: "text/html" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "Perisai_Aceh_" + title.replace(/[^a-zA-Z0-9]/g, "_") + ".html";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function stripForDownload(html) {
  return html
    .replace(/<button[\s\S]*?<\/button>/gi, "")
    .replace(/onclick="[^"]*"/gi, "")
    .replace(/class="[^"]*interactive[^"]*"/gi, 'class=""')
    .replace(/class="[^"]*no-print[^"]*"/gi, 'class=""')
    .replace(/neubrutalism-shadow[^"]*/g, "")
    .replace(/<script[\s\S]*?<\x2fscript>/gi, "");
}

// ===== ROUTER =====
function render() {
  const user = APP.data.sessionUser;
  if (!user) { renderLogin(); return; }
  const hash = location.hash.slice(1) || "dashboard";
  document.getElementById("app").innerHTML = layout(hash, user);
  attachNav(user);
  routePage(hash, user);
}

function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById("login-email").value.trim();
  const pass = document.getElementById("login-pass").value.trim();
  const user = APP.data.users.find(function(u) { return u.email === email && u.password === pass && u.aktif; });
  if (!user) { alert("Email atau password salah!"); return; }
  APP.data.sessionUser = user;
  localStorage.setItem("pa_session", JSON.stringify(user));
  location.hash = "dashboard";
  render();
}

function logout() {
  APP.data.sessionUser = null;
  localStorage.removeItem("pa_session");
  location.hash = "";
  render();
}

function closeModal(id) {
  var el = document.getElementById(id);
  if (el) el.remove();
}

function renderRiskMap(el, user) {
  var isSuper = user.role === "super_admin";
  var isOfficer = user.role === "risk_officer";
  var allItems = APP.data.riskRegister;
  if (isOfficer) allItems = allItems.filter(function(r) { return r.skpa === user.skpa; });
  var filterSkpa = document.getElementById("risk-filter-skpa");
  var filterTahun = document.getElementById("risk-filter-tahun");
  var filterStatus = document.getElementById("risk-filter-status");
  var fSkpa = filterSkpa ? filterSkpa.value : "";
  var fTahun = filterTahun ? filterTahun.value : "";
  var fStatus = filterStatus ? filterStatus.value : "";
  var items = allItems;
  if (fSkpa) items = items.filter(function(r) { return r.skpa === fSkpa; });
  if (fTahun) items = items.filter(function(r) { return r.tahun === parseInt(fTahun); });
  if (fStatus) items = items.filter(function(r) { return r.status === fStatus; });
  var skpaOptions = isSuper
    ? '<option value="">Semua SKPA</option>' + APP.data.skpaList.filter(function(s) { return s.aktif; }).map(function(s) { return '<option value="' + s.nama + '" ' + (fSkpa === s.nama ? "selected" : "") + '>' + s.nama + '</option>'; }).join("")
    : '<option value="">' + user.skpa + '</option>';

  var heatRows = "";
  var likelihoods = [5,4,3,2,1];
  var lLabels = {5:"Hampir Pasti",4:"Sangat Mungkin",3:"Mungkin",2:"Kurang Mungkin",1:"Sangat Jarang"};
  for (var li = 0; li < likelihoods.length; li++) {
    var l = likelihoods[li];
    heatRows += '<tr><td class="border-[1.5px] border-black p-2 bg-surface-container text-xs font-bold text-center">' + l + '<br><span class="text-xs font-normal">' + lLabels[l] + '</span></td>';
    for (var im = 1; im <= 5; im++) {
      var count = items.filter(function(r) { return r.skorKemungkinan === l && r.skorDampak === im; }).length;
      var score = l * im;
      var color = "#86efac", txtColor = "#000";
      if (score >= 20) { color = "#450a0a"; txtColor = "#fff"; }
      else if (score >= 12) { color = "#dc2626"; txtColor = "#fff"; }
      else if (score >= 8) { color = "#f59e0b"; }
      else if (score >= 4) { color = "#eab308"; }
      heatRows += '<td class="border-[1.5px] border-black p-2 text-center font-bold text-sm heatmap-cell" style="background:' + color + ';color:' + txtColor + ';min-width:56px" onclick="alert(\'Risiko dengan skor ' + score + ' (L:' + l + ', I:' + im + '): ' + count + ' item\')">' + (count || "&mdash;") + "</td>";
    }
    heatRows += "</tr>";
  }

  var tbody = items.length === 0
    ? '<tr><td colspan="8" class="border-[1.5px] border-black p-4 text-center text-on-surface-variant">Belum ada register risiko</td></tr>'
    : items.map(function(r) {
        var score = r.skorKemungkinan * r.skorDampak;
        var level, levelColor;
        if (score >= 20) { level = "Critical"; levelColor = "bg-danger text-white"; }
        else if (score >= 12) { level = "High"; levelColor = "bg-warning text-black"; }
        else if (score >= 8) { level = "Medium"; levelColor = "bg-warning/50 text-black"; }
        else if (score >= 4) { level = "Low"; levelColor = "bg-badge-accent text-black"; }
        else { level = "Very Low"; levelColor = "bg-green-100 text-black"; }
        var stColor = r.status === "Closed" ? "bg-success text-white" : r.status === "In Progress" ? "bg-warning text-black" : "bg-danger text-white";
        return '<tr class="hover:bg-surface-container-low">' +
          '<td class="border-[1.5px] border-black p-2 text-[13px]">' + r.skpa + '</td>' +
          '<td class="border-[1.5px] border-black p-2 text-[13px] max-w-[200px] truncate" title="' + r.risiko + '">' + r.risiko + '</td>' +
          '<td class="border-[1.5px] border-black p-2 text-center text-[13px]">' + r.skorKemungkinan + '</td>' +
          '<td class="border-[1.5px] border-black p-2 text-center text-[13px]">' + r.skorDampak + '</td>' +
          '<td class="border-[1.5px] border-black p-2 text-center text-[13px] font-bold">' + score + '</td>' +
          '<td class="border-[1.5px] border-black p-2 text-center"><span class="text-xs px-2 py-1 rounded-full font-bold border-[1.5px] border-black ' + levelColor + '">' + level + '</span></td>' +
          '<td class="border-[1.5px] border-black p-2 text-center"><span class="text-xs px-2 py-1 rounded-full font-bold border-[1.5px] border-black ' + stColor + '">' + r.status + '</span></td>' +
          '<td class="border-[1.5px] border-black p-2 text-center">' +
          '<button onclick="editRisk(' + r.id + ')" class="text-primary"><span class="material-symbols-outlined text-lg">edit</span></button> ' +
          '<button onclick="deleteRisk(' + r.id + ')" class="text-danger"><span class="material-symbols-outlined text-lg">delete</span></button></td></tr>';
      }).join("");

  var headerLabels = "";
  for (var hi = 1; hi <= 5; hi++) {
    headerLabels += '<th class="border-[1.5px] border-black p-2 bg-surface-container text-xs font-bold w-16">' + hi + '</th>';
  }

    '<div class="space-y-6">',
    '<div class="flex flex-wrap gap-3 items-center">',

    '<select id="risk-filter-tahun" class="px-4 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm neubrutalism-shadow-sm" onchange="renderRiskMap(document.getElementById(\'page-content\'), APP.data.sessionUser)"><option value="">Semua Tahun</option><option value="2026"' + (fTahun === "2026" ? " selected" : "") + '>2026</option><option value="2027"' + (fTahun === "2027" ? " selected" : "") + '>2027</option></select>',
    '<select id="risk-filter-status" class="px-4 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm neubrutalism-shadow-sm" onchange="renderRiskMap(document.getElementById(\'page-content\'), APP.data.sessionUser)"><option value="">Semua Status</option><option value="Open"' + (fStatus === "Open" ? " selected" : "") + '>Open</option><option value="In Progress"' + (fStatus === "In Progress" ? " selected" : "") + '>In Progress</option><option value="Closed"' + (fStatus === "Closed" ? " selected" : "") + '>Closed</option></select>',
    (isOfficer || isSuper) ? '<div class="ml-auto flex items-center gap-2">' +

      '<button onclick="showAddRiskModal()" class="flex items-center gap-2 bg-primary-container text-on-primary-container px-5 py-2.5 rounded-full border-[1.5px] border-black text-sm font-bold interactive-element neubrutalism-shadow-sm"><span class="material-symbols-outlined text-lg">add</span> Register Risiko Baru</button></div>' : "",
    '</div>',
    (fSkpa ? '<div class="bg-surface p-6 rounded-xl border-[1.5px] border-black neubrutalism-shadow" id="skpa-report">' +
      '<div class="flex items-start justify-between mb-4">' +

function uploadRiskFile(file) {
  if (!file) return;
  if (file.size > 2097152) { alert("File terlalu besar. Maksimal 2MB."); return; }
  var preview = document.getElementById("risk-import-preview");
  preview.style.display = "block";
  preview.innerHTML = '<div class="text-center py-4"><span class="material-symbols-outlined text-3xl animate-spin">refresh</span><p class="text-sm mt-2">Memproses file...</p></div>';

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = e.target.result;
      var rows = [];

      if (file.name.match(/\.xlsx?$/i)) {
        var wb = XLSX.read(data, { type: "array" });
        var ws = wb.Sheets[wb.SheetNames[0]];
        var json = XLSX.utils.sheet_to_json(ws, { defval: "" });
        json.forEach(function(r) {
          var row = {};
          Object.keys(r).forEach(function(k) { row[k.trim()] = (r[k] || "").toString().trim(); });
          rows.push(row);
        });
      } else if (file.name.endsWith(".json")) {
        var json = JSON.parse(typeof data === "string" ? data : new TextDecoder().decode(data));
        rows = Array.isArray(json) ? json : (json.data && Array.isArray(json.data) ? json.data : []);
      } else {
        var text = typeof data === "string" ? data : new TextDecoder().decode(data);
        var lines = text.split(/\r?\n/).filter(function(l) { return l.trim(); });
        if (lines.length > 1) {
          var headers = parseCSVLine(lines[0]);
          for (var i = 1; i < lines.length; i++) {
            var vals = parseCSVLine(lines[i]);
            if (vals.length < 2) continue;
            var row = {};
            headers.forEach(function(h, idx) { row[h] = vals[idx] || ""; });
            rows.push(row);
          }
        }
      }

      processImportedRows(rows, preview);
    } catch(err) {
      preview.innerHTML = '<div class="p-4 rounded-xl border-[1.5px] border-danger bg-danger/10"><p class="text-sm font-bold text-danger">Gagal membaca file</p><p class="text-xs mt-1">' + err.message + '</p></div>';
    }
  };
  if (file.name.match(/\.xlsx?$/i)) reader.readAsArrayBuffer(file);
  else reader.readAsText(file);
}

function parseCSVLine(line) {
  var result = [], current = "", inQuote = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (inQuote) {
      if (c === '"') {
        if (i + 1 < line.length && line[i+1] === '"') { current += '"'; i++; }
        else inQuote = false;
      } else { current += c; }
    } else {
      if (c === '"') inQuote = true;
      else if (c === ',') { result.push(current.trim()); current = ""; }
      else current += c;
    }
  }
  result.push(current.trim());
  return result;
}

function processImportedRows(rows, preview) {
  var valid = [];
  var errors = [];

  rows.forEach(function(row, i) {
    var skpa = row.SKPA || row.skpa || row.nama_skpa || "";
    var risiko = row["Pernyataan Risiko"] || row.risiko || row.pernyataan_risiko || row.deskripsi || row["PernyataanRisiko"] || "";
    if (!skpa) { errors.push("Baris " + (i+2) + ": SKPA tidak ditemukan"); return; }
    if (!risiko) { errors.push("Baris " + (i+2) + ": Pernyataan Risiko tidak ditemukan"); return; }
    var kemungkinan = parseInt(row["Skor Kemungkinan"] || row.skor_kemungkinan || row.likelihood || row.L || row["SkorKemungkinan"] || 3);
    var dampak = parseInt(row["Skor Dampak"] || row.skor_dampak || row.impact || row.I || row["SkorDampak"] || 3);
    valid.push({
      skpa: skpa, tahun: parseInt(row.Tahun || row.tahun || 2026),
      sasaran: row["Sasaran Strategis"] || row.sasaran || "",
      risiko: risiko,
      penyebab: row["Akar Penyebab"] || row.penyebab || row["AkarPenyebab"] || "",
      dampak: row.Dampak || row.dampak || "",
      skorKemungkinan: isNaN(kemungkinan) ? 3 : Math.min(5, Math.max(1, kemungkinan)),
      skorDampak: isNaN(dampak) ? 3 : Math.min(5, Math.max(1, dampak)),
      pengendalian: row.Pengendalian || row.pengendalian || row["Pengendalian yg Ada"] || "",
      rtp: row.RTP || row.rtp || row["Rencana Tindak Pengendalian"] || "",
      jadwal: row.Jadwal || row.jadwal || row["Jadwal Implementasi"] || "",
      pic: row.PIC || row.pic || row["Penanggung Jawab"] || "",
      status: row.Status || row.status || "Open",
    });
  });

  if (errors.length > 0 && valid.length === 0) {
    preview.innerHTML = '<div class="p-4 rounded-xl border-[1.5px] border-danger bg-danger/10"><p class="text-sm font-bold text-danger">' + errors.length + ' error, tidak ada data valid</p><ul class="text-xs mt-2 list-disc pl-4 max-h-32 overflow-y-auto">' + errors.slice(0, 20).map(function(e) { return '<li>' + e + '</li>'; }).join("") + '</ul></div>';
    return;
  }

  var errorMsg = "";
  if (errors.length > 0) errorMsg = '<div class="p-3 rounded-xl border-[1.5px] border-warning bg-warning/10 mb-3"><p class="text-xs font-bold">' + errors.length + ' baris dilewati (error)</p></div>';

  preview.innerHTML = errorMsg +
    '<div class="p-4 rounded-xl border-[1.5px] border-success bg-success/10">' +
    '<p class="text-sm font-bold text-success">' + valid.length + ' data risiko siap diimport</p>' +
    '<div class="max-h-40 overflow-y-auto mt-2 border-[1.5px] border-black rounded-lg">' +
    '<table class="w-full text-xs border-collapse"><thead><tr class="bg-surface-container">' +
    '<th class="border-[1.5px] border-black p-1">No</th><th class="border-[1.5px] border-black p-1">SKPA</th><th class="border-[1.5px] border-black p-1">Risiko</th><th class="border-[1.5px] border-black p-1">L</th><th class="border-[1.5px] border-black p-1">I</th><th class="border-[1.5px] border-black p-1">Status</th></tr></thead><tbody>' +
    valid.slice(0, 20).map(function(r, i) {
      return '<tr><td class="border-[1.5px] border-black p-1 text-center">' + (i+1) + '</td><td class="border-[1.5px] border-black p-1">' + r.skpa + '</td><td class="border-[1.5px] border-black p-1 max-w-[180px] truncate" title="' + r.risiko.replace(/"/g, "&quot;") + '">' + r.risiko + '</td><td class="border-[1.5px] border-black p-1 text-center">' + r.skorKemungkinan + '</td><td class="border-[1.5px] border-black p-1 text-center">' + r.skorDampak + '</td><td class="border-[1.5px] border-black p-1 text-center">' + r.status + '</td></tr>';
    }).join("") +
    (valid.length > 20 ? '<tr><td colspan="6" class="p-1 text-center text-on-surface-variant">... dan ' + (valid.length - 20) + ' lainnya</td></tr>' : "") +
    '</tbody></table></div>' +
    '<div class="flex gap-3 mt-3"><button onclick="confirmImport(' + valid.length + ')" class="bg-primary-container text-on-primary-container px-5 py-2.5 rounded-full border-[1.5px] border-black text-sm font-bold interactive-element neubrutalism-shadow-sm">Konfirmasi Import</button>' +
    '<span class="text-xs text-on-surface-variant self-center">Data akan ditambahkan ke register risiko yang sudah ada</span></div></div>';
  preview._validRows = valid;
}

function confirmImport(count) {

  var valid = preview._validRows;

}

  var items = APP.data.riskRegister.filter(function(r) { return r.skpa === skpa; });
  var dateStr = new Date().toLocaleDateString("id-ID", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
  var skpaInfo = APP.data.skpaList.find(function(s) { return s.nama === skpa; });
  var total = items.length;
  var critical = items.filter(function(r) { return r.skorKemungkinan * r.skorDampak >= 20; }).length;
  var high = items.filter(function(r) { var s = r.skorKemungkinan * r.skorDampak; return s >= 12 && s < 20; }).length;
  var medium = items.filter(function(r) { var s = r.skorKemungkinan * r.skorDampak; return s >= 8 && s < 12; }).length;

    '.title { font-size: 18px; font-weight: 900; margin: 24px 0 16px; padding-bottom: 8px; border-bottom: 2px solid #00837d; }' +
    '.info { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }' +
    '.info-item { flex: 1; min-width: 140px; padding: 12px; border: 1.5px solid #000; border-radius: 8px; text-align: center; }' +
    '.info-item .num { font-size: 28px; font-weight: 900; }' +
    '.info-item .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; }' +
    'table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 24px; }' +
    'th, td { border: 1px solid #000; padding: 8px; text-align: left; }' +
    'th { background: #f0f5f4; font-weight: 700; font-size: 11px; }' +
    '.footer { margin-top: 32px; padding-top: 16px; border-top: 2px solid #ddd; font-size: 11px; color: #888; text-align: center; }' +
    '@media print { @page { margin: 1.5cm; } .no-print { display: none; } }' +
    '</style></head><body>' +
    '<div class="kop"><h1>PEMERINTAH ACEH</h1><p>SISTEM PENGENDALIAN INTERN (PERISAI)</p><p style="font-size:11px;color:#888">Dicetak: ' + dateStr + '</p></div>' +
    '<div class="title">LAPORAN RISIKO: ' + skpa.toUpperCase() + '</div>' +
    '<div class="info">' +
    '<div class="info-item" style="background:#e2f0e6"><div class="num">' + total + '</div><div class="lbl">Total Risiko</div></div>' +
    '<div class="info-item" style="background:#fce4e4"><div class="num" style="color:#dc2626">' + critical + '</div><div class="lbl">Critical</div></div>' +
    '<div class="info-item" style="background:#fff3e0"><div class="num" style="color:#f97316">' + high + '</div><div class="lbl">High</div></div>' +
    '<div class="info-item" style="background:#fffde7"><div class="num" style="color:#ca8a04">' + medium + '</div><div class="lbl">Medium</div></div>' +

    '</tr></thead><tbody>' +
    (items.length === 0 ? '<tr><td colspan="10" style="text-align:center;padding:16px">Belum ada data risiko</td></tr>' :
      items.map(function(r, i) {
        var s = r.skorKemungkinan * r.skorDampak;
        var lvl = s >= 20 ? "Critical" : s >= 12 ? "High" : s >= 8 ? "Medium" : "Low";

// ===== MODUL 2: SPIP =====
function renderSPIP(el, user) {
  var isSuper = user.role === "super_admin";
  var isOfficer = user.role === "risk_officer";
  var items = APP.data.spipEvidence;
  if (isOfficer) items = items.filter(function(s) { return s.skpa === user.skpa; });
  var skpaList = [...new Set(APP.data.spipEvidence.map(function(s) { return s.skpa; }))];
  var unsurList = ["Lingkungan Pengendalian","Penilaian Risiko","Kegiatan Pengendalian","Informasi & Komunikasi","Pemantauan"];

  var scores = unsurList.map(function(u, idx) {
    var related = items.filter(function(i) { return i.unsur === u; });
    var verified = related.filter(function(i) { return i.status === "Terverifikasi"; }).length;
    var total = Math.max(related.length, 1);
    return { label: u, score: Math.min(5, (verified / total) * 5), verified: verified, total: related.length };
  });

  var filterSkpaHtml = isSuper
    ? '<select id="spip-filter-skpa" class="px-4 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm neubrutalism-shadow-sm" onchange="renderSPIP(document.getElementById(\'page-content\'), APP.data.sessionUser)"><option value="">Semua SKPA</option>' + skpaList.map(function(s) { return '<option value="' + s + '">' + s + '</option>'; }).join("") + '</select>' : "";

  var progressHtml = scores.map(function(s, i) {
    var pct = (s.score / 5 * 100).toFixed(0);
    var colors = ["#00837d","#f59e0b","#3b82f6","#8b5cf6","#ec4899"];
    var circ = 2 * Math.PI * 35;
    var off = circ * (1 - s.score / 5);
    return '<div class="flex flex-col items-center p-4 bg-surface-container-low rounded-xl border-[1.5px] border-black">' +
      '<div class="relative w-20 h-20 mb-2"><svg class="w-20 h-20" viewBox="0 0 80 80">' +
      '<circle cx="40" cy="40" r="35" fill="none" stroke="#dde4de" stroke-width="6"/>' +
      '<circle cx="40" cy="40" r="35" fill="none" stroke="' + colors[i] + '" stroke-width="6" stroke-dasharray="' + circ + '" stroke-dashoffset="' + off + '" stroke-linecap="round" transform="rotate(-90 40 40)"/>' +
      '</svg><div class="absolute inset-0 flex items-center justify-center"><span class="font-headline text-sm font-black">' + s.score.toFixed(1) + '</span></div></div>' +
      '<p class="text-xs font-bold text-center leading-tight">' + s.label + '</p>' +
      '<p class="text-[9px] text-on-surface-variant mt-1">' + pct + '%</p></div>';
  }).join("");

  var tbody = items.length === 0
    ? '<tr><td colspan="5" class="border-[1.5px] border-black p-4 text-center text-on-surface-variant">Belum ada bukti dukung</td></tr>'
    : items.map(function(s) {
        var st = s.status === "Terverifikasi" ? "bg-success text-white" : "bg-warning text-black";
        return '<tr class="hover:bg-surface-container-low">' +
          '<td class="border-[1.5px] border-black p-2 text-[13px]">' + s.skpa + '</td>' +
          '<td class="border-[1.5px] border-black p-2 text-[13px]"><strong>' + s.unsur + '</strong><br><span class="text-xs">' + s.subUnsur + '</span></td>' +
          '<td class="border-[1.5px] border-black p-2 text-[13px] max-w-[200px] truncate">' + (s.uraian || "-") + '</td>' +
          '<td class="border-[1.5px] border-black p-2 text-center"><span class="text-xs px-2 py-1 rounded-full font-bold border-[1.5px] border-black ' + st + '">' + s.status + '</span></td>' +
          '<td class="border-[1.5px] border-black p-2 text-center">' +
          '<button onclick="deleteSPIP(' + s.id + ')" class="text-danger"><span class="material-symbols-outlined text-lg">delete</span></button>' +
          (isSuper ? ' <button onclick="verifySPIP(' + s.id + ')" class="text-primary"><span class="material-symbols-outlined text-lg">check_circle</span></button>' : "") +
          '</td></tr>';
      }).join("");

  el.innerHTML = [
    '<div class="space-y-6">',
    '<div class="flex flex-wrap gap-3 items-center">', filterSkpaHtml,
    '<select id="spip-filter-unsur" class="px-4 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm neubrutalism-shadow-sm" onchange="renderSPIP(document.getElementById(\'page-content\'), APP.data.sessionUser)"><option value="">Semua Unsur</option>' + unsurList.map(function(u) { return '<option value="' + u + '">' + u + '</option>'; }).join("") + '</select>',
    '<button onclick="showAddSPIPModal()" class="ml-auto bg-primary-container text-on-primary-container px-5 py-2.5 rounded-full border-[1.5px] border-black text-sm font-bold interactive-element neubrutalism-shadow-sm flex items-center gap-2"><span class="material-symbols-outlined text-lg">upload_file</span> Upload Bukti Dukung</button></div>',
    '<div class="bg-surface p-6 rounded-xl border-[1.5px] border-black neubrutalism-shadow"><h3 class="font-headline text-lg font-black mb-4">Progress Tracker 5 Unsur SPIP</h3><div class="grid grid-cols-1 md:grid-cols-5 gap-5">' + progressHtml + '</div></div>',
    '<div class="bg-surface p-6 rounded-xl border-[1.5px] border-black neubrutalism-shadow"><h3 class="font-headline text-lg font-black mb-4">Daftar Bukti Dukung SPIP</h3>',
    '<div class="overflow-x-auto"><table class="w-full text-sm border-collapse"><thead><tr class="bg-surface-container"><th class="border-[1.5px] border-black p-2 text-xs font-bold text-left">SKPA</th><th class="border-[1.5px] border-black p-2 text-xs font-bold text-left">Unsur / Sub-Unsur</th><th class="border-[1.5px] border-black p-2 text-xs font-bold text-left">Uraian</th><th class="border-[1.5px] border-black p-2 text-xs font-bold text-center">Status</th><th class="border-[1.5px] border-black p-2 text-xs font-bold text-center">Aksi</th></tr></thead><tbody>' + tbody + '</tbody></table></div></div></div>'
  ].join("");
}

function showAddSPIPModal() {

  var skpaList = [...new Set(APP.data.users.filter(function(u) { return u.role === "risk_officer"; }).map(function(u) { return u.skpa; }))];
  var unsurList = ["Lingkungan Pengendalian","Penilaian Risiko","Kegiatan Pengendalian","Informasi & Komunikasi","Pemantauan"];

    (user.role === "risk_officer" ? '<option value="' + user.skpa + '">' + user.skpa + '</option>' : skpaList.map(function(s) { return '<option value="' + s + '">' + s + '</option>'; }).join("")) + '</select></div>',
    '<div><label class="text-xs font-bold block mb-1">Unsur</label><select id="spip-unsur" class="w-full px-3 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm"><option value="">-- Pilih Unsur --</option>' + unsurList.map(function(u) { return '<option value="' + u + '">' + u + '</option>'; }).join("") + '</select></div>',
    '<div><label class="text-xs font-bold block mb-1">Sub-Unsur Penilaian</label><select id="spip-subunsur" class="w-full px-3 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm"><option value="">-- Pilih Unsur Terlebih Dahulu --</option></select></div>',
    '<div><label class="text-xs font-bold block mb-1">Uraian Kondisi Nyata</label><textarea id="spip-uraian" rows="3" required class="w-full px-3 py-2.5 rounded-xl border-[1.5px] border-black text-sm"></textarea></div>',
    '<div><label class="text-xs font-bold block mb-1">Dokumen Bukti Dukung (PDF, max 10MB)</label><input type="file" accept=".pdf,.jpg,.png" class="w-full px-3 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm file:mr-3 file:py-1.5 file:px-4 file:rounded-full file:border-[1.5px] file:border-black file:bg-primary-container file:text-white file:font-bold"></div>',
    '<div><label class="text-xs font-bold block mb-1">Link Dokumentasi (opsional)</label><input type="url" placeholder="https://drive.google.com/..." class="w-full px-3 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm"></div>',
    '<div class="flex gap-3 pt-2"><button type="submit" class="bg-primary-container text-on-primary-container px-6 py-3 rounded-full border-[1.5px] border-black text-sm font-bold interactive-element neubrutalism-shadow-sm">Upload</button><button type="button" onclick="closeModal(\'spip-modal\')" class="bg-white px-6 py-3 rounded-full border-[1.5px] border-black text-sm font-bold interactive-element">Batal</button></div>',
    "</form></div></div>"
  ].join(""));
  document.getElementById("spip-unsur").addEventListener("change", function() {
    var map = {"Lingkungan Pengendalian":["1.1 Penegakan Integritas","1.2 Komitmen terhadap Kompetensi","1.3 Kepemimpinan yang Kondusif"],"Penilaian Risiko":["2.1 Identifikasi Risiko","2.2 Analisis Risiko","2.3 Penanganan Risiko"],"Kegiatan Pengendalian":["3.1 Prosedur Pengendalian","3.2 Pemisahan Tugas","3.3 Pengamanan Aset"],"Informasi & Komunikasi":["4.1 Informasi yang Relevan","4.2 Komunikasi Efektif","4.3 Sistem Informasi"],"Pemantauan":["5.1 Pemantauan Berkelanjutan","5.2 Evaluasi Terpisah","5.3 Tindak Lanjut Temuan"]};
    var el = document.getElementById("spip-subunsur");
    el.innerHTML = (map[this.value] || []).map(function(s) { return '<option value="' + s + '">' + s + '</option>'; }).join("");
  });
}

function saveSPIP(e) {
  e.preventDefault();
  var user = APP.data.sessionUser;
  var skpaEl = document.getElementById("spip-skpa");
  APP.data.spipEvidence.push({
    id: APP.id(APP.data.spipEvidence),
    skpa: skpaEl ? skpaEl.value : (user.role === "risk_officer" ? user.skpa : ""),
    unsur: document.getElementById("spip-unsur").value,
    subUnsur: document.getElementById("spip-subunsur").value,
    uraian: document.getElementById("spip-uraian").value,
    status: "Perlu Verifikasi",
  });
  APP.save("spipEvidence");
  closeModal("spip-modal");
  render();
}

function deleteSPIP(id) {
  if (!confirm("Hapus bukti dukung ini?")) return;
  APP.data.spipEvidence = APP.data.spipEvidence.filter(function(s) { return s.id !== id; });
  APP.save("spipEvidence");
  render();
}

function verifySPIP(id) {
  var item = APP.data.spipEvidence.find(function(s) { return s.id === id; });
  if (item) { item.status = "Terverifikasi"; APP.save("spipEvidence"); render(); }
}

// ===== MODUL 3: TLHP =====
function renderTLHP(el, user) {
  var isSuper = user.role === "super_admin";
  var isOfficer = user.role === "risk_officer";
  var items = APP.data.tlhpItems;
  if (isOfficer) items = items.filter(function(t) { return t.skpa === user.skpa; });
  var skpaList = [...new Set(APP.data.tlhpItems.map(function(t) { return t.skpa; }))];
  var filterSkpaHtml = isSuper ? '<select id="tlhp-filter-skpa" class="px-4 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm neubrutalism-shadow-sm" onchange="renderTLHP(document.getElementById(\'page-content\'), APP.data.sessionUser)"><option value="">Semua SKPA</option>' + skpaList.map(function(s) { return '<option value="' + s + '">' + s + '</option>'; }).join("") + '</select>' : "";
  var totalSetor = items.reduce(function(s, t) { return s + (t.nilaiSetor || 0); }, 0);

  var tbody = items.length === 0
    ? '<tr><td colspan="7" class="border-[1.5px] border-black p-4 text-center text-on-surface-variant">Belum ada data TLHP</td></tr>'
    : items.map(function(t) {
        var now = new Date();
        var due = new Date(t.batasWaktu);

        var stBadge = t.status === "SS" ? "bg-success text-white" : t.status === "BS" ? "bg-warning text-black" : "bg-danger text-white";
        return '<tr class="hover:bg-surface-container-low ' + (overDue && t.status !== "SS" ? "countdown-warning" : "") + '">' +
          '<td class="border-[1.5px] border-black p-2 text-[13px]">' + t.skpa + '</td>' +
          '<td class="border-[1.5px] border-black p-2 text-[13px]">' + t.nomorLhp + '<br><span class="text-[9px] text-on-surface-variant">' + t.kodeTemuan + '</span></td>' +
          '<td class="border-[1.5px] border-black p-2 text-[13px] max-w-[200px] truncate" title="' + t.rekomendasiAuditor.replace(/"/g, "&quot;") + '">' + t.rekomendasiAuditor + '</td>' +
          '<td class="border-[1.5px] border-black p-2 text-center text-[13px]">' + t.batasWaktu + '<br><span class="text-[9px] font-bold ' + (overDue ? "text-danger" : "text-on-surface-variant") + '">' + (overDue ? "Telat " + Math.abs(daysLeft) + " hari" : daysLeft + " hari") + '</span></td>' +
          '<td class="border-[1.5px] border-black p-2 text-right text-[13px]">Rp ' + (t.nominalTemuan || 0).toLocaleString("id-ID") + '</td>' +
          '<td class="border-[1.5px] border-black p-2 text-center"><span class="inline-block text-xs px-2 py-1 rounded-full font-bold border-[1.5px] border-black ' + stBadge + '">' + t.status + '</span></td>' +
          '<td class="border-[1.5px] border-black p-2 text-center">' +
          ((isOfficer || isSuper) ? '<button onclick="editTLHP(' + t.id + ')" class="text-primary"><span class="material-symbols-outlined text-lg">edit</span></button> ' : "") +
          (isSuper ? '<button onclick="verifyTLHP(' + t.id + ')" class="text-primary" title="Verifikasi"><span class="material-symbols-outlined text-lg">how_to_reg</span></button>' : "") +
          '</td></tr>';
      }).join("");

  el.innerHTML = [
    '<div class="space-y-6">',
    '<div class="flex flex-wrap gap-3 items-center">', filterSkpaHtml,
    '<select id="tlhp-filter-status" class="px-4 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm neubrutalism-shadow-sm" onchange="renderTLHP(document.getElementById(\'page-content\'), APP.data.sessionUser)"><option value="">Semua Status</option><option value="SS">SS - Selesai Sesuai</option><option value="BS">BS - Belum Sesuai</option><option value="TD">TD - Belum Ditindaklanjuti</option></select>',
    ((isOfficer || isSuper) ? '<button onclick="showAddTLHPModal()" class="ml-auto bg-primary-container text-on-primary-container px-5 py-2.5 rounded-full border-[1.5px] border-black text-sm font-bold interactive-element neubrutalism-shadow-sm flex items-center gap-2"><span class="material-symbols-outlined text-lg">add</span> Input Tindak Lanjut</button>' : ""),
    '</div>',
    '<div class="grid grid-cols-2 lg:grid-cols-4 gap-4">',
    '<div class="bg-surface p-4 rounded-xl border-[1.5px] border-black neubrutalism-shadow text-center"><span class="material-symbols-outlined text-3xl text-success">check_circle</span><p class="font-headline text-2xl font-black">' + items.filter(function(t) { return t.status === "SS"; }).length + '</p><p class="text-xs font-bold">SS - Selesai Sesuai</p></div>',

function saveTLHP(e) {
  e.preventDefault();
  var id = document.getElementById("tlhp-id").value;
  var user = APP.data.sessionUser;
  var skpaEl = document.getElementById("tlhp-skpa");
  var data = {
    skpa: skpaEl ? skpaEl.value : (user.role === "risk_officer" ? user.skpa : ""),
    nomorLhp: document.getElementById("tlhp-nomor").value,
    tanggalLhp: document.getElementById("tlhp-tgl").value,
    kodeTemuan: document.getElementById("tlhp-kode").value,
    rekomendasiAuditor: document.getElementById("tlhp-rekomendasi").value,
    nominalTemuan: parseInt(document.getElementById("tlhp-nominal").value) || 0,
    nilaiSetor: parseInt(document.getElementById("tlhp-setor").value) || 0,
    tindakan: document.getElementById("tlhp-tindakan").value,
    batasWaktu: document.getElementById("tlhp-batas").value,
    pic: document.getElementById("tlhp-pic").value,
    status: document.getElementById("tlhp-status").value,
    buktiUrl: "", tglInput: new Date().toISOString().slice(0, 10),
  };
  if (id) {
    var idx = APP.data.tlhpItems.findIndex(function(t) { return t.id == id; });
    if (idx > -1) { for (var k in data) APP.data.tlhpItems[idx][k] = data[k]; }
  } else {
    data.id = APP.id(APP.data.tlhpItems);
    APP.data.tlhpItems.push(data);
  }
  APP.save("tlhpItems");
  closeModal("tlhp-modal");
  render();
}

function editTLHP(id) {
  var data = APP.data.tlhpItems.find(function(t) { return t.id === id; });
  if (data) showAddTLHPModal(data);
}

function verifyTLHP(id) {
  var item = APP.data.tlhpItems.find(function(t) { return t.id === id; });
  if (item && item.status === "BS") { item.status = "SS"; APP.save("tlhpItems"); render(); }
  else if (item) { alert("Status sudah SS atau TD. Hanya status BS yang bisa diverifikasi."); }
}

function renderFraud(el, user) {
  var isSuper = user.role === "super_admin";

  if (isOfficer) alerts = alerts.filter(function(a) { return a.skpa === user.skpa; });
  var sevOrder = { critical: 0, high: 1, medium: 2, low: 3 };
  alerts.sort(function(a,b) { return sevOrder[a.severity] - sevOrder[b.severity]; });
  var skpaList = [...new Set(APP.data.fraudAlerts.map(function(a) { return a.skpa; }))];
  var fraudIndex = alerts.length > 0 ? Math.min(100, Math.round(alerts.filter(function(a) { return a.severity === "critical" || a.severity === "high"; }).length / Math.max(alerts.length, 1) * 100)) : 0;
  var circ = 2 * Math.PI * 45;

    '<select id="fraud-filter-severity" class="px-4 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm neubrutalism-shadow-sm" onchange="renderFraud(document.getElementById(\'page-content\'), APP.data.sessionUser)"><option value="">Semua Severity</option><option value="critical">Critical</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>',
    (isSuper ? '<button onclick="showFraudConfigModal()" class="ml-auto bg-primary-container text-on-primary-container px-5 py-2.5 rounded-full border-[1.5px] border-black text-sm font-bold interactive-element neubrutalism-shadow-sm flex items-center gap-2"><span class="material-symbols-outlined text-lg">tune</span> Konfigurasi Threshold AI</button>' : ""),
    '</div>',

function renderCompliance(el, user) {
  var isSuper = user.role === "super_admin";

  if (isOfficer) items = items.filter(function(c) { return c.skpa === user.skpa; });
  var skpaList = [...new Set(APP.data.complianceChecks.map(function(c) { return c.skpa; }))];
  var total = items.length;
  var sesuai = items.filter(function(c) { return c.status === "Sesuai"; }).length;
  var pct = total > 0 ? Math.round(sesuai / total * 100) : 0;
  var circ = 2 * Math.PI * 45;
  var off = circ * (1 - pct / 100);
  var pctColor = pct >= 80 ? "#00837d" : pct >= 50 ? "#f59e0b" : "#dc2626";

function saveUser(e) {
  e.preventDefault();
  var id = document.getElementById("user-id").value;
  var data = {
    nama: document.getElementById("user-nama").value,
    email: document.getElementById("user-email").value,
    password: document.getElementById("user-password").value,
    role: document.getElementById("user-role").value,
    skpa: (document.getElementById("user-skpa") ? document.getElementById("user-skpa").value : "-"),
    aktif: true,
  };
  if (id) {
    var idx = APP.data.users.findIndex(function(u) { return u.id == id; });
    if (idx > -1) { for (var k in data) APP.data.users[idx][k] = data[k]; }
  } else {
    data.id = APP.id(APP.data.users);
    APP.data.users.push(data);
  }
  APP.save("users");
  closeModal("user-modal");
  render();
}

function editUser(id) {
  var data = APP.data.users.find(function(u) { return u.id === id; });
  if (data) showAddUserModal(data);
}

function toggleUser(id) {
  var user = APP.data.users.find(function(u) { return u.id === id; });
  if (user) { user.aktif = !user.aktif; APP.save("users"); render(); }
}

function deleteUser(id) {
  if (!confirm("Hapus pengguna ini?")) return;
  APP.data.users = APP.data.users.filter(function(u) { return u.id !== id; });
  APP.save("users");
  render();
}

// ===== DASHBOARD =====
function renderDashboard(el, user) {
  var riskCount = APP.data.riskRegister.filter(function(r) { return user.role === "super_admin" || r.skpa === user.skpa; }).length;
  var openRisk = APP.data.riskRegister.filter(function(r) { return (user.role === "super_admin" || r.skpa === user.skpa) && r.status === "Open"; }).length;
  var tlhpCount = APP.data.tlhpItems.filter(function(t) { return user.role === "super_admin" || t.skpa === user.skpa; }).length;
  var tlhpPending = APP.data.tlhpItems.filter(function(t) { return (user.role === "super_admin" || t.skpa === user.skpa) && t.status !== "SS"; }).length;
  var fraudCritical = APP.data.fraudAlerts.filter(function(f) { return user.role === "super_admin" || f.skpa === user.skpa; }).filter(function(f) { return f.severity === "critical" || f.severity === "high"; }).length;
  var compDone = APP.data.complianceChecks.filter(function(c) { return user.role === "super_admin" || c.skpa === user.skpa; }).filter(function(c) { return c.status === "Sesuai"; }).length;
  var compTotal = APP.data.complianceChecks.filter(function(c) { return user.role === "super_admin" || c.skpa === user.skpa; }).length;
  var compPct = compTotal > 0 ? Math.round(compDone / compTotal * 100) : 0;
  var riskArr = APP.data.riskRegister.filter(function(r) { return user.role === "super_admin" || r.skpa === user.skpa; });
  var avgRisk = riskCount > 0 ? (riskArr.reduce(function(s, r) { return s + r.skorKemungkinan * r.skorDampak; }, 0) / riskCount).toFixed(1) : 0;
  var spipScores = [3.2, 2.8, 3.5, 3.0, 2.5];
  var spipAvg = (spipScores.reduce(function(a,b) { return a+b; }, 0) / 5).toFixed(1);
  var compCirc = 2 * Math.PI * 54;
  var compOff = compCirc * (1 - compPct / 100);

  var heatRows = "";
  for (var l = 5; l >= 1; l--) {
    heatRows += '<tr><td class="border-[1.5px] border-black p-2 bg-surface-container text-xs font-bold text-center">' + l + '</td>';
    for (var im = 1; im <= 5; im++) {
      var cnt = riskArr.filter(function(r) { return r.skorKemungkinan === l && r.skorDampak === im; }).length;
      var sc = l * im;
      var color = "#86efac", tc = "#000";
      if (sc >= 20) { color = "#450a0a"; tc = "#fff"; }
      else if (sc >= 12) { color = "#dc2626"; tc = "#fff"; }
      else if (sc >= 8) { color = "#f59e0b"; }
      else if (sc >= 4) { color = "#eab308"; }
      heatRows += '<td class="border-[1.5px] border-black p-2 text-center font-bold heatmap-cell" style="background:' + color + ';color:' + tc + ';min-width:56px">' + (cnt || "") + "</td>";
    }
    heatRows += "</tr>";
  }

  var fraudList = APP.data.fraudAlerts.filter(function(f) { return user.role === "super_admin" || f.skpa === user.skpa; }).slice(0, 3).map(function(f) {
    var icon = f.severity === "critical" ? "gpp_bad" : f.severity === "high" ? "error" : "info";
    var ic = f.severity === "critical" ? "text-danger" : f.severity === "high" ? "text-warning" : "text-primary";
    var sc = f.severity === "critical" ? "bg-danger text-white" : f.severity === "high" ? "bg-warning text-black" : "bg-badge-accent text-black";
    return '<div class="flex items-start gap-3 p-3 border-b-[2px] border-black last:border-0">' +
      '<span class="material-symbols-outlined ' + ic + '">' + icon + '</span>' +
      '<div class="flex-1 min-w-0"><p class="text-sm font-bold">' + f.kategori + '</p><p class="text-xs text-on-surface-variant">' + f.skpa + " - " + f.deskripsi + '</p></div>' +
      '<span class="text-xs px-2 py-1 rounded-full font-bold border-[1.5px] border-black ' + sc + '">' + f.severity.toUpperCase() + "</span></div>";
  }).join("") || '<p class="text-sm text-on-surface-variant">Belum ada alert fraud</p>';

  var spipLabels = ["Lingkungan Pengendalian","Penilaian Risiko","Kegiatan Pengendalian","Informasi & Komunikasi","Pemantauan"];
  var spipColors = ["#00837d","#f59e0b","#3b82f6","#8b5cf6","#ec4899"];
  var spipBars = spipScores.map(function(s, i) {
    return '<div><div class="flex justify-between items-center mb-1"><span class="text-xs font-bold">' + spipLabels[i] + '</span><span class="text-xs font-bold">' + s.toFixed(1) + '/5</span></div>' +
      '<div class="w-full h-3 bg-surface-variant rounded-full border-[1.5px] border-black overflow-hidden"><div class="h-full transition-all duration-500" style="width:' + (s/5*100) + '%;background:' + spipColors[i] + ';border-radius:9999px"></div></div></div>';
  }).join("");

  el.innerHTML = [
    '<div class="space-y-6">',
    '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">',
    '<div class="bg-surface p-5 rounded-xl border-[1.5px] border-black neubrutalism-shadow interactive-element"><div class="flex items-center gap-3"><div class="w-12 h-12 bg-primary-container rounded-xl border-[1.5px] border-black flex items-center justify-center"><span class="material-symbols-outlined text-white text-2xl">map</span></div><div><p class="text-xs text-on-surface-variant">Total Risiko</p><p class="font-headline text-2xl font-black">' + riskCount + '</p></div></div><div class="mt-2 flex gap-1"><span class="text-xs px-2 py-0.5 rounded-full bg-danger text-white font-bold">' + openRisk + ' Open</span><span class="text-xs px-2 py-0.5 rounded-full bg-success text-white font-bold">' + (riskCount - openRisk) + ' Tertangani</span></div></div>',
    '<div class="bg-surface p-5 rounded-xl border-[1.5px] border-black neubrutalism-shadow interactive-element"><div class="flex items-center gap-3"><div class="w-12 h-12 bg-primary-container rounded-xl border-[1.5px] border-black flex items-center justify-center"><span class="material-symbols-outlined text-white text-2xl">verified</span></div><div><p class="text-xs text-on-surface-variant">Maturitas SPIP</p><p class="font-headline text-2xl font-black">' + spipAvg + '</p></div></div><p class="text-xs text-on-surface-variant mt-1">Skala 1-5 (BPKP Standard)</p></div>',
    '<div class="bg-surface p-5 rounded-xl border-[1.5px] border-black neubrutalism-shadow interactive-element"><div class="flex items-center gap-3"><div class="w-12 h-12 bg-primary-container rounded-xl border-[1.5px] border-black flex items-center justify-center"><span class="material-symbols-outlined text-white text-2xl">fact_check</span></div><div><p class="text-xs text-on-surface-variant">TLHP Pending</p><p class="font-headline text-2xl font-black">' + tlhpPending + '</p></div></div><p class="text-xs text-on-surface-variant mt-1">Dari ' + tlhpCount + ' total temuan</p></div>',

    '<div class="grid grid-cols-1 lg:grid-cols-3 gap-5">',

    '<table class="w-full text-sm border-collapse"><thead><tr class="bg-surface-container">' +
    '<th class="border-[1.5px] border-black p-2 text-xs font-bold text-left">Nama SKPA</th><th class="border-[1.5px] border-black p-2 text-xs font-bold text-left">Alamat</th><th class="border-[1.5px] border-black p-2 text-xs font-bold text-left">Kontak</th><th class="border-[1.5px] border-black p-2 text-xs font-bold text-center">Pengguna</th><th class="border-[1.5px] border-black p-2 text-xs font-bold text-center">Risiko</th><th class="border-[1.5px] border-black p-2 text-xs font-bold text-center">Status</th><th class="border-[1.5px] border-black p-2 text-xs font-bold text-center">Aksi</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table></div></div>'
  ].join("");
}

function showAddSKPAModal(data) {
  var isEdit = !!data;
  document.getElementById("app").insertAdjacentHTML("beforeend", [
    '<div class="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4" id="skpa-modal" onclick="if(event.target===this)closeModal(\'skpa-modal\')">',
    '<div class="bg-surface rounded-2xl border-[1.5px] border-black neubrutalism-shadow w-full max-w-lg max-h-[90vh] overflow-y-auto p-6">',
    '<div class="flex items-center justify-between mb-6"><h3 class="font-headline text-xl font-black">' + (isEdit ? "Edit" : "Tambah") + ' SKPA</h3><button onclick="closeModal(\'skpa-modal\')" class="w-8 h-8 rounded-full border-[1.5px] border-black flex items-center justify-center"><span class="material-symbols-outlined">close</span></button></div>',
    '<form id="form-skpa" class="space-y-4" onsubmit="saveSKPA(event)">',
    '<input type="hidden" id="skpa-id" value="' + (data ? data.id : "") + '">',
    '<div><label class="text-xs font-bold block mb-1">Nama SKPA</label><input type="text" id="skpa-nama" value="' + (data ? data.nama : "") + '" required class="w-full px-3 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm"></div>',
    '<div><label class="text-xs font-bold block mb-1">Alamat</label><textarea id="skpa-alamat" rows="2" class="w-full px-3 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm">' + (data ? data.alamat || "" : "") + '</textarea></div>',
    '<div><label class="text-xs font-bold block mb-1">Kontak (Email)</label><input type="email" id="skpa-kontak" value="' + (data ? data.kontak || "" : "") + '" class="w-full px-3 py-2.5 rounded-xl border-[1.5px] border-black bg-white text-sm"></div>',
    '<div class="flex gap-3 pt-2"><button type="submit" class="bg-primary-container text-on-primary-container px-6 py-3 rounded-full border-[1.5px] border-black text-sm font-bold interactive-element neubrutalism-shadow-sm">' + (isEdit ? "Simpan" : "Tambah") + '</button><button type="button" onclick="closeModal(\'skpa-modal\')" class="bg-white px-6 py-3 rounded-full border-[1.5px] border-black text-sm font-bold interactive-element">Batal</button></div>',
    "</form></div></div>"
  ].join(""));
}

function saveSKPA(e) {
  e.preventDefault();
  var id = document.getElementById("skpa-id").value;
  var data = {
    nama: document.getElementById("skpa-nama").value,
    alamat: document.getElementById("skpa-alamat").value,
    kontak: document.getElementById("skpa-kontak").value,
    aktif: true,
  };
  if (id) {
    var idx = APP.data.skpaList.findIndex(function(s) { return s.id == id; });
    if (idx > -1) { for (var k in data) APP.data.skpaList[idx][k] = data[k]; }
  } else {
    data.id = APP.id(APP.data.skpaList);
    APP.data.skpaList.push(data);
  }
  APP.save("skpaList");
  closeModal("skpa-modal");
  render();
}

function editSKPA(id) {
  var data = APP.data.skpaList.find(function(s) { return s.id === id; });
  if (data) showAddSKPAModal(data);
}

function toggleSKPA(id) {
  var skpa = APP.data.skpaList.find(function(s) { return s.id === id; });
  if (skpa) { skpa.aktif = !skpa.aktif; APP.save("skpaList"); render(); }
}

function deleteSKPA(id) {
  var skpa = APP.data.skpaList.find(function(s) { return s.id === id; });
  if (!skpa) return;
  var userUsage = APP.data.users.filter(function(u) { return u.skpa === skpa.nama; }).length;
  var riskUsage = APP.data.riskRegister.filter(function(r) { return r.skpa === skpa.nama; }).length;
  var msg = "Hapus SKPA \"" + skpa.nama + "\"?";
  if (userUsage > 0 || riskUsage > 0) msg += "\nReferensi terkait: " + userUsage + " pengguna, " + riskUsage + " risiko.";
  if (!confirm(msg)) return;
  APP.data.skpaList = APP.data.skpaList.filter(function(s) { return s.id !== id; });
  APP.save("skpaList");
  render();
}

// ===== INIT =====
render();
</script>
</body>
</html>
